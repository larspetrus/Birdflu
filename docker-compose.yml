services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: birdflu
      POSTGRES_PASSWORD: birdflu
      POSTGRES_DB: birdflu_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./seed_data:/app/seed_data
    ports:
      - "5433:5432"

  web:
    build: .
    command: bundle exec rails server -b 0.0.0.0
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://birdflu:birdflu@db/birdflu_development
      RAILS_ENV: development
      SECRET_KEY_BASE: b17f0bafe651be7b4a3ea8ae01d385648caeaf97f9475e9c436d4574496468c10ff6c66cdbd9c3ec59c9fdb8abfaea5c82c6a700e2c1c7814156e7ddfd7d8639

volumes:
  postgres_data:
